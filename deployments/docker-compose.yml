version: "3.9"
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: openpup
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: agora
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--store_dir", "/data"]
    volumes:
      - natsdata:/data

  app:
    build:
      context: ../
      dockerfile: deployments/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - nats
    environment:
      CONFIG_PATH: /app/configs/config.yaml

volumes:
  pgdata:
  natsdata:
